<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>tennovatech Dashboard</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;padding:2rem}</style>
  </head>
  <body>
    <h1>Welcome to tennovatech</h1>
    <p id="welcome-message">You are signed in.</p>
    <p><a href="index.html">Back to login</a></p>
    <script>
      var params = new URLSearchParams(window.location.search);
      var user = params.get('user') || sessionStorage.getItem('tennovatech_user') || '';
      if (user) {
        document.getElementById('welcome-message').textContent = 'You are signed in as ' + user + '.';
      }
    </script>
  </body>
</html>
