		function encription_decription(action, string) {
			// Lightweight encode/decode helper (no server call)
			// NOTE: This is NOT strong encryption; it is only obfuscation for transient storage.
			try {
				var value = (string === undefined || string === null) ? '' : String(string);

				if (action === 'encript') {
					// Unicode-safe base64
					return btoa(unescape(encodeURIComponent(value)));
				}
				if (action === 'decript') {
					return decodeURIComponent(escape(atob(value)));
				}
			} catch (e) {
				return '';
			}
			return '';
		}

			}

			}
